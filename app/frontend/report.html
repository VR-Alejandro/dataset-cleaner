<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dataset Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="report.css">
</head>
<body>

<!-- ==========================================
     PARTE SUPERIOR - Cabecera y KPIs
     ========================================== -->
<div class="top-section">
    
    <!-- NAVEGACIÓN Y CABECERA -->
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <a href="index.html" class="back-btn mb-2">← Back to Workspace</a>
            <h2 class="fw-bold mb-0">Reporting Area</h2>
            <p class="text-muted mb-0" id="reportFilename">filename.csv</p>
        </div>
        <!-- BOTONES DE DESCARGA -->
        <div class="d-flex gap-3">
            <button id="btnDownloadJson" class="btn btn-outline-dark rounded-pill px-4 fw-semibold">Download JSON report</button>
            <button id="btnDownloadCsv" class="btn btn-dark rounded-pill px-4 fw-semibold">Download clean dataset</button>
        </div>
    </div>

    <!-- KPIs GENERALES -->
    <div class="row g-4 mb-3">
        <!-- Dimensiones -->
        <div class="col-md-3">
            <div class="glass-card">
                <div class="kpi-title">Shape (Rows × Cols)</div>
                <div class="kpi-value d-flex align-items-end gap-2" id="kpiShape">
                    <span>0 <span class="fs-5 text-muted">× 0</span></span>
                </div>
            </div>
        </div>
        <!-- Duplicados -->
        <div class="col-md-3">
            <div class="glass-card">
                <div class="kpi-title">Duplicate Rows</div>
                <div class="kpi-value" id="kpiDuplicates">0</div>
                <div class="mt-2 text-muted small">Removed during cleaning</div>
            </div>
        </div>
        <!-- Valores nulos -->
        <div class="col-md-3">
            <div class="glass-card">
                <div class="kpi-title">Missing Values</div>
                <div class="kpi-value" id="kpiMissing">0</div>
                <div class="mt-2 text-muted small">Resolved successfully</div>
            </div>
        </div>
        <!-- Configuración -->
        <div class="col-md-3">
            <div class="glass-card">
                <div class="kpi-title">Cleaning Strategy</div>
                <div class="mt-2">
                    <span class="kpi-badge badge-green d-inline-block mb-1" id="kpiConfigNum">Num: Mean</span><br>
                    <span class="kpi-badge badge-green d-inline-block" id="kpiConfigCat">Cat: Mode</span>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- ==========================================
     PARTE INFERIOR - Gráficos e Insights 
     ========================================== -->
<div class="bottom-section">

    <!-- EXPLORADOR E INSIGHTS -->
    <div class="row g-4 mb-4">
        
        <!-- Explorador de variables (Izquierda) -->
        <div class="col-md-4">
            <div class="glass-card">
                <h6 class="fw-bold mb-3">Variables</h6>
                <div class="var-list-container" id="variableList">
                    <!-- Botones generados por JS irán aquí -->
                </div>
            </div>
        </div>

        <!-- Zona de gráficos -->
        <div class="col-md-8">
            <div class="glass-card d-flex flex-column">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold mb-0" id="chartTitle">Distribution: </h6>
                    <div class="btn-group btn-group-sm">
                        <!-- Botones para cambiar entre gráfico y stats -->
                        <button id="btnViewChart" class="btn btn-outline-secondary active">Chart</button>
                        <button id="btnViewStats" class="btn btn-outline-secondary">Stats</button>
                    </div>
                </div>
                
                <!-- Lienzo donde se inyectará Chart.js -->
                <div class="flex-grow-1 position-relative" style="min-height: 300px;">
                    <canvas id="distributionChart"></canvas>

                    <div id="statsViewContainer" class="d-none w-100 h-100 overflow-y-auto">
                        <!-- Las tablas numéricas se inyectan aquí dinámicamente -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- INSIGHTS y CORRELACIÓN -->
    <div class="row g-4">
        <!-- AI Insights -->
        <div class="col-md-6">
            <div class="glass-card d-flex flex-column" style="min-height: 410px;">
                <h6 class="fw-bold mb-3">Automated Insights</h6>
                <div class="insights-scroll-container flex-grow-1" id="insightsContainer">
                </div>
            </div>
        </div>

        <!-- Mapa de calor -->
        <div class="col-md-6">
            <div class="glass-card d-flex flex-column" style="min-height: 410px;">
                <h6 class="fw-bold mb-3">Correlation Matrix</h6>
                <!-- Lienzo para la matriz de correlación -->
                <div class="flex-grow-1 position-relative">
                    <div class="heatmap-wrapper" id="heatmapWrapper" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="report.js"></script>
</body>
</html>
