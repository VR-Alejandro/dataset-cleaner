<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dataset Cleaner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-viewport">
    
    <div class="sidebar-wrapper">
        <div class="glass-card sidebar-panel shadow-sm">
            
            <div class="dropzone mb-4" id="dropzone">
                <p class="mb-0 fw-bold text-secondary">Upload dataset</p>
                
                <div class="drop-text-wrapper small text-muted">
                    <span class="drop-text-normal">or drop here</span>
                    <span class="drop-text-hover">Drop here!</span>
                </div>
                
                <input type="file" id="fileInput" class="d-none">
            </div>
            
            <div class="mb-4 text-start">
                
                <!-- Tratamiento de nulos numéricos -->
                <div class="mb-3">
                    <label for="numNullTreatment" class="form-label text-secondary fw-bold mb-1" style="font-size: 0.8rem;">
                        Numerical null treatment
                    </label>
                    <select id="numNullTreatment" name="numerical_null_treatment" class="form-select form-select-sm text-center" style="cursor: pointer;">
                        <option value="drop">Drop</option>
                        <option value="mean" selected>Mean</option>
                    </select>
                </div>
                
                <!-- Tratamiento de nulos categóricos -->
                <div class="mb-3">
                    <label for="catNullTreatment" class="form-label text-secondary fw-bold mb-1" style="font-size: 0.8rem;">
                        Categorical null treatment
                    </label>
                    <select id="catNullTreatment" name="categorical_null_treatment" class="form-select form-select-sm text-center" style="cursor: pointer;">
                        <option value="drop">Drop</option>
                        <option value="mode" selected>Mode</option>
                    </select>
                </div>

                <!-- Selector grupos histograma -->
                <div>
                    <label for="histogramBins" class="form-label text-secondary fw-bold mb-1" style="font-size: 0.8rem;">
                        Histogram bins
                    </label>
                    <input type="number" id="histogramBins" name="histogram_bins" class="form-control form-control-sm text-center" value="10" min="5" max="50">
                    <div class="form-text text-center mt-1" style="font-size: 0.7rem;">
                        Number of groups (5 - 50)
                    </div>
                </div>

            </div>

            <button id="uploadBtn" class="btn btn-dark w-100 rounded-pill py-2 fw-semibold">
                Submit dataset
            </button>
            <button id="clearBtn" class="btn btn-gray w-100 rounded-pill py-2 fw-semibold">
                Clear
            </button>
        </div>
    </div>

    <div class="main-content position-relative">
        
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
            <h6 class="mb-0 text-secondary fw-bold text-uppercase tracking-wider" style="font-size: 0.85rem;">Uploaded datasets</h6>
            <div id="paginationControls" class="btn-group btn-group-sm"></div>
        </div>

        <div id="datasetList" class="dataset-list-scroll d-flex flex-column gap-3"></div>

        <a id="deleteAllBtn" class="delete-animate-btn position-absolute" style="right: 2rem; bottom: 2rem;" role="button">
            <span>Delete all</span>
            <div class="icon">
                <span class="icon-remove">❌</span>
                <span class="icon-check">✔️</span>
            </div>
        </a>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
